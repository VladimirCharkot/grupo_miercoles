<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Fulbacho</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: sans-serif;
      min-height: 100vh;
      background: #f0f0f0;
      display: flex;
      flex-direction: column;
      gap: 16px;
      padding: 20px;
    }

    .topbar {
      background: #264653;
      color: white;
      height: 60px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      padding: 0 20px;
      font-size: 1.4rem;
      font-weight: bold;
    }

    .medio {
      display: flex;
      flex-direction: row;
      gap: 16px;
      flex: 1;
    }

    .sidebar {
      background: #2a9d8f;
      width: 220px;
      border-radius: 10px;
      padding: 16px;
    }

    .sidebar ul {
      list-style: none;
    }

    .sidebar li {
      color: white;
      padding: 10px 8px;
      cursor: pointer;
      border-radius: 6px;
    }

    .sidebar li:hover {
      background: rgba(255, 255, 255, 0.2);
    }

    .sidebar li.activo {
      background: rgba(255, 255, 255, 0.35);
      font-weight: bold;
    }

    .content {
      background: white;
      flex: 1;
      border-radius: 10px;
      padding: 24px;
    }

    .content h2 {
      margin-bottom: 16px;
      color: #264653;
    }

    .content p {
      margin-bottom: 8px;
      font-size: 1.1rem;
    }

    .footer {
      background: #264653;
      color: white;
      height: 50px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      padding: 0 20px;
    }
  </style>
</head>
<body>

  <div class="topbar">Fulbacho</div>

  <div class="medio">

    <div class="sidebar">
      <ul id="lista-botines">
        {% for b in botines %}
          <li data-index="{{ loop.index0 }}">{{ b.nombre }}</li>
        {% endfor %}
      </ul>
    </div>

    <div class="content" id="content">
      <p>Seleccioná un jugador de la lista.</p>
    </div>

  </div>

  <div class="footer">Fulbacho &copy; 2026</div>

  <script>
    // Los datos vienen del servidor como JSON
    const botines = {{ botines | tojson }};

    const lista = document.querySelector('#lista-botines');
    const content = document.querySelector('.content');

    lista.addEventListener('click', function(evento) {
      const itemClickeado = evento.target;

      // Marcamos el item clickeado como activo (y sacamos el anterior)
      const itemAnterior = lista.querySelector('.activo');
      if (itemAnterior) {
        itemAnterior.classList.remove('activo');
      }
      itemClickeado.classList.add('activo');

      // Buscamos al jugador usando el índice guardado en data-index
      const indice = itemClickeado.getAttribute('data-index');
      const botin = botines[indice];

      // Limpiamos el contenido anterior
      content.innerHTML = '';

      // Creamos y agregamos los elementos con la info del jugador
      const nombre = document.createElement('h2');
      nombre.textContent = botin.nombre;
      content.appendChild(nombre);

      const precio = document.createElement('p');
      precio.textContent = 'Precio: $' + botin.precio;
      content.appendChild(precio);

    //   const edad = document.createElement('p');
    //   edad.textContent = 'Edad: ' + botin.edad + ' años';
    //   content.appendChild(edad);

      const talle = document.createElement('p');
      talle.textContent = 'Talle: ' + botin.talle;
      content.appendChild(talle);
    });
  </script>

</body>
</html>

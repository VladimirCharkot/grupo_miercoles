<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Fulbacho - Competiciones</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: sans-serif;
      min-height: 100vh;
      background: #f0f0f0;
      display: flex;
      flex-direction: column;
      gap: 16px;
      padding: 20px;
    }

    .topbar {
      background: #264653;
      color: white;
      height: 60px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      padding: 0 20px;
      font-size: 1.4rem;
      font-weight: bold;
    }

    h2 {
      color: #264653;
      font-size: 1.3rem;
    }

    .grilla {
      display: flex;
      flex-wrap: wrap;
      gap: 16px;
    }

    .tarjeta {
      background: white;
      border-radius: 10px;
      padding: 20px;
      width: 200px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      text-align: center;
    }

    .tarjeta img {
      width: 80px;
      height: 80px;
      object-fit: contain;
    }

    .tarjeta .nombre {
      font-weight: bold;
      color: #264653;
      font-size: 1rem;
    }

    .tarjeta .area {
      color: #888;
      font-size: 0.85rem;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .tarjeta .area img {
      width: 20px;
      height: 20px;
      object-fit: contain;
    }

    .tarjeta .tipo {
      font-size: 0.8rem;
      padding: 3px 10px;
      border-radius: 20px;
      background: #e9f5f4;
      color: #2a9d8f;
      font-weight: bold;
    }

    .footer {
      background: #264653;
      color: white;
      height: 50px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      padding: 0 20px;
    }
  </style>
</head>
<body>

  <div class="topbar">Fulbacho</div>

  <h2>Competiciones ({{ competiciones | length }})</h2>

  <div class="grilla">
    {% for comp in competiciones %}
      <div class="tarjeta">
        <img src="{{ comp.emblem }}" alt="{{ comp.name }}">
        <div class="nombre">{{ comp.name }}</div>
        <div class="area">
          {% if comp.area.flag %}
            <img src="{{ comp.area.flag }}" alt="{{ comp.area.name }}">
          {% endif %}
          {{ comp.area.name }}
        </div>
        <div class="tipo">{{ comp.type }}</div>
      </div>
    {% endfor %}
  </div>

  <div class="footer">Fulbacho &copy; 2026</div>

</body>
</html>
